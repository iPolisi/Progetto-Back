<!DOCTYPE html>
<html lang="it">
<head>
    <title>Gestisci Evento</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <h1>{% if object %}Modifica Evento{% else %}Crea Nuovo Evento{% endif %}</h1>
        <div class="card p-4 mt-4 shadow-sm">
            <form method="POST">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="btn btn-success">Salva Evento</button>
                <a href="{% url 'organizer_dashboard' %}" class="btn btn-secondary">Annulla</a>
            </form>
        </div>
    </div>
</body>
</html>
