<!DOCTYPE html>
<html lang="it">
<head>
    <title>Elimina Evento</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="alert alert-danger shadow-sm">
            <h2>Attenzione!</h2>
            <p>Sei sicuro di voler eliminare definitivamente l'evento <b>"{{ object.title }}"</b>?</p>
            <form method="POST">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger">Sì, eliminalo</button>
                <a href="{% url 'organizer_dashboard' %}" class="btn btn-secondary">Annulla</a>
            </form>
        </div>
    </div>
</body>
</html>
